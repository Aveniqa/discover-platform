name: Weekly Data Backup

on:
  schedule:
    # Every Sunday at 23:00 UTC — after the week's daily editions have settled
    - cron: '0 23 * * 0'
  workflow_dispatch: # Manual backup button

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create backup archive
        id: archive
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p /tmp/backup
          ARCHIVE="/tmp/backup/data-snapshot-${DATE}.tar.gz"

          # Include all JSON data files, the image cache, and the live
          # automated-content feeds (current-events, trending-live, drafts).
          # Trending-live updates 8x/day so its history isn't otherwise
          # recoverable without trawling the git log.
          tar -czf "$ARCHIVE" \
            data/*.json \
            automated-content/*.json \
            public/feed.xml 2>/dev/null || true

          # Output archive path and size
          SIZE=$(du -h "$ARCHIVE" | cut -f1)
          echo "archive=$ARCHIVE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Created: $ARCHIVE ($SIZE)"
          tar -tzf "$ARCHIVE" | head -20

      - name: Upload backup as artifact (90-day retention)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: data-backup-${{ steps.archive.outputs.date }}
          path: ${{ steps.archive.outputs.archive }}
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### Data Backup Complete :floppy_disk:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** ${{ steps.archive.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ steps.archive.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Retention:** 90 days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the run's **Artifacts** section if recovery is needed." >> $GITHUB_STEP_SUMMARY

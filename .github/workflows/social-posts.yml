name: Daily Social Posts

on:
  # PAUSED 2026-07-10 at the owner's request — focus is on the website
  # build + AdSense approval. The pipeline itself is healthy (Bluesky +
  # Pinterest publish fine; X needs API credits). To resume: uncomment the
  # schedule below and `gh workflow enable social-posts.yml`.
  # schedule:
  #   - cron: '25 12 * * 1,3,5'   # Mon/Wed/Fri at 8:25 AM ET
  #   - cron: '42 12 * * 2,4'     # Tue/Thu at 8:42 AM ET
  #   - cron: '35 13 * * 0,6'     # Weekends at 9:35 AM ET
  workflow_dispatch: # Manual trigger

concurrency:
  group: social-posts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'

      - name: Generate social media posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/generate-social-posts.mjs

      - name: Publish to social platforms
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/publish-social-posts.mjs

      - name: Commit social queue updates
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          node scripts/validate-data.js
          git add data/social-queue.json data/social-posted.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📱 Social posts: $(date +%Y-%m-%d)"
          # Retry push up to 3x — see daily-edition.yml for rationale.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts"
          exit 1

  alert-on-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: generate-and-publish
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create GitHub Issue for failed social run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const title = `⚠️ Social posts failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `The **Daily Social Posts** workflow failed.`,
              ``,
              `**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Triggered by:** ${context.eventName}`,
              ``,
              `Check the run logs to see which step errored. Social posts may not have been published today.`,
              ``,
              `Close this issue once resolved.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'automation']
            });

      - name: Notify Slack webhook
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: Daily Social Posts
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; GitHub issue notification created."
            exit 0
          fi
          node -e 'process.stdout.write(JSON.stringify({ text: `Surfaced automation failed: ${process.env.WORKFLOW_NAME}\n${process.env.RUN_URL}` }))' \
            | curl -fsS -X POST -H "Content-Type: application/json" --data @- "$SLACK_WEBHOOK_URL"

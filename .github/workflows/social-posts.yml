name: Daily Social Posts

on:
  schedule:
    # Run at 12:30 UTC (8:30 AM ET) — 30 min after daily edition
    - cron: '30 12 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Generate social media posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/generate-social-posts.mjs

      - name: Publish to social platforms
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/publish-social-posts.mjs

      - name: Commit social queue updates
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          git add data/social-queue.json data/social-posted.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📱 Social posts: $(date +%Y-%m-%d)"
          git push

name: Weekly ASIN Backfill

# Rewrites Amazon affiliate URLs from /s?k= search pages to direct /dp/<ASIN>
# product pages. The daily pipeline sets ASINs for new products going forward;
# this workflow cleans up the existing archive and any items the daily pipeline
# couldn't identify the first time around. Safe to re-run — items that already
# have an ASIN are skipped.

on:
  schedule:
    # Every Monday at 11:30 UTC (just after the daily edition window so it
    # operates on fresh data, but doesn't race the daily commit).
    - cron: '30 11 * * 1'
  workflow_dispatch: # Manual trigger button

concurrency:
  group: asin-backfill
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ASIN backfill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: node scripts/backfill-asins.js

      - name: Commit and push
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          git add data/products.json
          if git diff --staged --quiet; then
            echo "No ASINs were backfilled this run."
            exit 0
          fi
          git commit -m "🔗 Weekly ASIN backfill: $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

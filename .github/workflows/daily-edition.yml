name: Daily Surfaced Edition

on:
  # Re-enabled 2026-07-01: the pipeline is fully pivoted to hidden-gems +
  # daily-tools (generate-daily-content.js, daily-rotate.js, and
  # generate-social-posts.mjs all target only the two live verticals; the
  # legacy data files are empty and archived).
  schedule:
    - cron: '0 11 * * *' # 7am ET daily
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

concurrency:
  group: daily-edition
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          [ -n "$GEMINI_API_KEY" ] || (echo "❌ GEMINI_API_KEY is not set" && exit 1)
          [ -n "$PEXELS_API_KEY" ] || echo "⚠️ PEXELS_API_KEY is not set — images will not be fetched"

      - name: Install dependencies
        run: npm ci

      - name: Remove oldest items
        run: node scripts/daily-rotate.js --run

      - name: Generate fresh content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          # Signal sources (optional — pipeline falls back to pure AI if missing)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: node scripts/generate-daily-content.js

      - name: Normalize affiliate links
        env:
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: node scripts/normalize-affiliate-links.js

      - name: Upgrade new products to direct ASIN links
        env:
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: node scripts/fetch-product-asins.js
        continue-on-error: true

      - name: Validate JSON files
        run: node scripts/validate-data.js

      - name: AdSense content quality gate
        run: node scripts/audit-adsense-content.mjs --strict

      - name: Validate outbound URLs (recent items)
        run: node scripts/validate-urls.js --recent
        continue-on-error: true

      - name: Assign editorial badges
        run: node scripts/assign-badges.js

      - name: Generate today's picks
        run: node scripts/generate-todays-picks.js

      - name: Populate collections
        run: node scripts/populate-collections.js

      - name: Generate website screenshots for hidden gems
        run: node scripts/fetch-screenshots.js

      - name: Fetch images for new items
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: npx tsx scripts/fetch-images.ts
        continue-on-error: true

      - name: Product commerce accuracy gate
        env:
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: node scripts/audit-product-commerce.mjs

      - name: Build site
        run: npm run build

      - name: Send daily newsletter
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: node scripts/send-newsletter.mjs
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          node scripts/validate-data.js
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📰 Daily edition: $(date +%Y-%m-%d)"
          # Retry push up to 3x — trending-live and social-posts can push
          # from parallel workflows; a transient race must not waste a 30-min
          # Gemini-call generation run.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts"
          exit 1

  alert-on-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: daily-update
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create GitHub Issue for failed run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const title = `⚠️ Daily edition failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `The **Daily Surfaced Edition** workflow failed.`,
              ``,
              `**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Branch:** \`${context.ref}\``,
              `**Triggered by:** ${context.eventName}`,
              ``,
              `Check the run logs to see which step errored. The site content is now stale until this is resolved.`,
              ``,
              `Close this issue once the problem is fixed and a successful run completes.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'automation']
            });

      - name: Notify Slack webhook
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: Daily Surfaced Edition
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; GitHub issue notification created."
            exit 0
          fi
          node -e 'process.stdout.write(JSON.stringify({ text: `Surfaced automation failed: ${process.env.WORKFLOW_NAME}\n${process.env.RUN_URL}` }))' \
            | curl -fsS -X POST -H "Content-Type: application/json" --data @- "$SLACK_WEBHOOK_URL"

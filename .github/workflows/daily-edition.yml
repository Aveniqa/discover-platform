name: Daily Surfaced Edition

on:
  schedule:
    # 6am ET = 10:00 UTC (EDT) or 11:00 UTC (EST). Using 10:00 for summer.
    - cron: '0 10 * * *'
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

permissions:
  contents: write
  issues: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Remove oldest items
        run: node scripts/daily-rotate.js --run

      - name: Generate fresh content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-daily-content.js

      - name: Validate JSON files
        run: node scripts/validate-data.js

      - name: Fetch images for new items
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: npx tsx scripts/fetch-images.ts
        continue-on-error: true

      - name: Build site
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📰 Daily edition: $(date +%Y-%m-%d)"
          git push

  alert-on-failure:
    runs-on: ubuntu-latest
    needs: daily-update
    if: failure()
    steps:
      - name: Create GitHub Issue for failed run
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Daily edition failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `The **Daily Surfaced Edition** workflow failed.`,
              ``,
              `**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Branch:** \`${context.ref}\``,
              `**Triggered by:** ${context.eventName}`,
              ``,
              `Check the run logs to see which step errored. The site content is now stale until this is resolved.`,
              ``,
              `Close this issue once the problem is fixed and a successful run completes.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'automation']
            });

name: Daily Surfaced Edition

on:
  schedule:
    # 7am ET = 11:00 UTC (EDT) or 12:00 UTC (EST). Using 11:00 for summer.
    - cron: '0 11 * * *'
  workflow_dispatch: # Manual trigger button in GitHub Actions UI

concurrency:
  group: daily-edition
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          [ -n "$GEMINI_API_KEY" ] || (echo "❌ GEMINI_API_KEY is not set" && exit 1)
          [ -n "$PEXELS_API_KEY" ] || echo "⚠️ PEXELS_API_KEY is not set — images will not be fetched"

      - name: Install dependencies
        run: npm ci

      - name: Remove oldest items
        run: node scripts/daily-rotate.js --run

      - name: Generate fresh content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          # Signal sources (optional — pipeline falls back to pure AI if missing)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: node scripts/generate-daily-content.js

      - name: Validate JSON files
        run: node scripts/validate-data.js

      - name: Validate outbound URLs (recent items)
        run: node scripts/validate-urls.js --recent
        continue-on-error: true

      - name: Assign editorial badges
        run: node scripts/assign-badges.js

      - name: Generate today's picks
        run: node scripts/generate-todays-picks.js

      - name: Populate collections
        run: node scripts/populate-collections.js

      - name: Generate website screenshots for hidden gems
        run: node scripts/fetch-screenshots.js

      - name: Fetch images for new items
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: npx tsx scripts/fetch-images.ts
        continue-on-error: true

      - name: Build site
        run: npm run build

      - name: Send daily newsletter
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: node scripts/send-newsletter.mjs
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📰 Daily edition: $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

  alert-on-failure:
    runs-on: ubuntu-latest
    needs: daily-update
    if: failure()
    steps:
      - name: Create GitHub Issue for failed run
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Daily edition failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `The **Daily Surfaced Edition** workflow failed.`,
              ``,
              `**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Branch:** \`${context.ref}\``,
              `**Triggered by:** ${context.eventName}`,
              ``,
              `Check the run logs to see which step errored. The site content is now stale until this is resolved.`,
              ``,
              `_This issue will auto-close on the next successful daily-edition run._`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'automation']
            });

  close-stale-alerts:
    runs-on: ubuntu-latest
    needs: daily-update
    if: success()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Auto-close open daily-edition alerts
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automation',
              per_page: 100,
            });
            const stale = issues.filter((i) => i.title.startsWith('⚠️ Daily edition failed'));
            for (const issue of stale) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Auto-closing — daily edition ran successfully ([run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})).`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
            if (stale.length) {
              core.notice(`Closed ${stale.length} stale daily-edition alert(s).`);
            }

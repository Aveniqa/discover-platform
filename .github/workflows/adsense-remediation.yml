name: AdSense Content Remediation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run audit only, or create/update a remediation PR"
        required: true
        default: "audit"
        type: choice
        options:
          - audit
          - remediate
      target_branch:
        description: "Branch to update when mode=remediate"
        required: true
        default: "codex/adsense-content-remediation-v2"
        type: string

concurrency:
  group: adsense-remediation
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  adsense-remediation:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.mode == 'remediate' && inputs.target_branch || 'main' }}
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit current content
        run: node scripts/audit-adsense-content.mjs

      - name: Stop after audit
        if: ${{ inputs.mode == 'audit' }}
        run: echo "Audit-only mode complete."

      - name: Create remediation branch
        if: ${{ inputs.mode == 'remediate' }}
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: git checkout -B "$TARGET_BRANCH"

      - name: Enrich all thin pages
        if: ${{ inputs.mode == 'remediate' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/enrich-existing-items.js

      - name: Replace low-quality source URLs
        if: ${{ inputs.mode == 'remediate' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/retrofit-sources.mjs --run

      - name: Validate remediated data
        if: ${{ inputs.mode == 'remediate' }}
        run: |
          node scripts/validate-data.js
          node scripts/audit-adsense-content.mjs --strict

      - name: Build remediated site
        if: ${{ inputs.mode == 'remediate' }}
        run: npm run build

      - name: Commit remediation changes
        if: ${{ inputs.mode == 'remediate' }}
        id: commit
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          git add data docs public/feed.xml
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No remediation changes to commit."
            exit 0
          fi
          git commit -m "content: remediate AdSense low-value signals"
          git push --force-with-lease origin "$TARGET_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update remediation PR
        if: ${{ inputs.mode == 'remediate' && steps.commit.outputs.changed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          body="$(cat <<'BODY'
          ## Summary
          - Enriches item pages that were thin enough to risk AdSense low-value-content classification.
          - Replaces weak Wikipedia/wikiHow-style sources with stronger source URLs where Gemini can identify an authoritative replacement.
          - Runs JSON validation, strict AdSense content audit, and a full static build before pushing.

          ## Review notes
          This PR is generated by the manual AdSense Content Remediation workflow. Review the data changes before merging.
          BODY
          )"
          existing="$(gh api "/repos/${GITHUB_REPOSITORY}/pulls?head=${GITHUB_REPOSITORY_OWNER}:${TARGET_BRANCH}&base=main" --jq '.[0].number // ""')"
          if [ -n "$existing" ]; then
            gh api --method PATCH "/repos/${GITHUB_REPOSITORY}/pulls/${existing}" \
              -f title="Remediate AdSense content quality signals" \
              -f body="$body"
          else
            gh api --method POST "/repos/${GITHUB_REPOSITORY}/pulls" \
              -f base="main" \
              -f head="$TARGET_BRANCH" \
              -f title="Remediate AdSense content quality signals" \
              -f body="$body"
          fi

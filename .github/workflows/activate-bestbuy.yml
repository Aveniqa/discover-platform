name: Activate Best Buy Affiliate

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  activate:
    # Only run when the issue title matches the template
    if: contains(github.event.issue.title, 'Activate Best Buy Impact affiliate URLs')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract form data from issue body
        id: extract
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Extract tracking ID
            const trackingMatch = body.match(/### Impact Tracking ID\s*\n\s*(.+)/);
            const trackingId = trackingMatch ? trackingMatch[1].trim() : '';

            // Extract program ID
            const programMatch = body.match(/### Impact Program ID \(Best Buy\)\s*\n\s*(.+)/);
            const programId = programMatch ? programMatch[1].trim() : '';

            // Extract format
            const formatMatch = body.match(/### Impact Link Format\s*\n\s*(.+)/);
            const formatRaw = formatMatch ? formatMatch[1].trim() : 'Standard (goto.bestbuy.com)';
            const format = formatRaw.includes('Impact redirect') ? 'impact' : 'standard';

            if (!trackingId || !programId) {
              core.setFailed('Missing tracking ID or program ID in issue body');
              return;
            }

            core.setOutput('tracking_id', trackingId);
            core.setOutput('program_id', programId);
            core.setOutput('format', format);

            console.log(`Tracking ID: ${trackingId}`);
            console.log(`Program ID: ${programId}`);
            console.log(`Format: ${format}`);

      - name: Run Best Buy affiliate activation script
        env:
          TRACKING_ID: ${{ steps.extract.outputs.tracking_id }}
          PROGRAM_ID: ${{ steps.extract.outputs.program_id }}
          FORMAT: ${{ steps.extract.outputs.format }}
        run: |
          node scripts/activate-bestbuy-affiliate.js \
            --tracking-id="$TRACKING_ID" \
            --program-id="$PROGRAM_ID" \
            --format="$FORMAT"

      - name: Validate data
        run: node scripts/validate-data.js

      - name: Build site
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🏬 Activate Best Buy Impact affiliate tracking (${{ steps.extract.outputs.tracking_id }})"
          git pull --rebase --autostash origin main
          git push

      - name: Store tracking IDs as secrets reminder
        id: secrets_note
        run: |
          echo "note=Remember to add BESTBUY_TRACKING_ID and BESTBUY_PROGRAM_ID as GitHub Secrets for the daily workflow." >> $GITHUB_OUTPUT

      - name: Comment on issue with results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('fs');
            const products = JSON.parse(fs.readFileSync('data/products.json', 'utf8'));
            const bbCount = products.filter(p => p.bestBuyUrl).length;
            const trackedCount = products.filter(p => p.bestBuyUrl && (p.bestBuyUrl.includes('evyy.net') || p.bestBuyUrl.includes('goto.bestbuy.com'))).length;

            const body = [
              `## ✅ Best Buy Affiliate Activation Complete`,
              ``,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Products with Best Buy URLs | **${bbCount}** |`,
              `| Converted to Impact tracking | **${trackedCount}** |`,
              `| Tracking ID | \`${{ steps.extract.outputs.tracking_id }}\` |`,
              `| Program ID | \`${{ steps.extract.outputs.program_id }}\` |`,
              `| Link format | \`${{ steps.extract.outputs.format }}\` |`,
              ``,
              `### What was updated`,
              `- \`data/products.json\` — all Best Buy URLs now use Impact tracking`,
              `- \`scripts/generate-daily-content.js\` — future products will auto-get tracked URLs`,
              `- \`scripts/bulk-generate-content.js\` — bulk generation also uses tracked URLs`,
              ``,
              `### Next step`,
              `Add these **GitHub Secrets** so the daily workflow uses tracked URLs for new products:`,
              `- \`BESTBUY_TRACKING_ID\` = \`${{ steps.extract.outputs.tracking_id }}\``,
              `- \`BESTBUY_PROGRAM_ID\` = \`${{ steps.extract.outputs.program_id }}\``,
              ``,
              `Site will auto-deploy via Cloudflare Pages in ~60 seconds.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

  alert-on-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: activate
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment failure on issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                `## ❌ Activation Failed`,
                ``,
                `The Best Buy affiliate activation workflow failed.`,
                `[View the run logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                ``,
                `Check that the Tracking ID and Program ID are correct and try again by opening a new issue.`,
              ].join('\n'),
            });

      - name: Notify Slack webhook
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: Activate Best Buy Affiliate
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; GitHub issue notification created."
            exit 0
          fi
          node -e 'process.stdout.write(JSON.stringify({ text: `Surfaced automation failed: ${process.env.WORKFLOW_NAME}\n${process.env.RUN_URL}` }))' \
            | curl -fsS -X POST -H "Content-Type: application/json" --data @- "$SLACK_WEBHOOK_URL"

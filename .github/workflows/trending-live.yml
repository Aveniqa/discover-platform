name: Trending Live Content

on:
  # PAUSED 2026-05-19: Surfaced pivoted away from current-events/trending
  # products. The script's editorial gate already fails closed without signals
  # so it's safe, but stopping the schedule avoids API quota burn.
  # schedule:
  #   - cron: '17 */3 * * *'
  workflow_dispatch:

concurrency:
  group: trending-live-content
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-live-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run automated content brain
        id: brain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: node scripts/automated-content-brain.mjs

      - name: Enrich top-story publisher videos
        id: videos
        if: steps.brain.outputs.changed == 'true'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        # YouTube API has a daily quota and occasional capacity flakes.
        # Enrichment is opportunistic — items still publish without videos.
        continue-on-error: true
        run: node scripts/enrich-current-event-videos.mjs

      - name: Audit automated update
        if: steps.brain.outputs.changed == 'true' || steps.videos.outputs.changed == 'true'
        run: npm run audit:all

      - name: Build static site
        if: steps.brain.outputs.changed == 'true' || steps.videos.outputs.changed == 'true'
        run: npm run build

      - name: Notify IndexNow of fresh sitemap
        if: steps.brain.outputs.changed == 'true' || steps.videos.outputs.changed == 'true'
        # IndexNow is a best-effort search-engine ping. A 5xx from Bing/Yandex
        # must not invalidate an otherwise-clean live update — the sitemap is
        # still available for crawlers via the next polite poll.
        continue-on-error: true
        run: npm run seo:ping

      - name: Create breaking-news email draft
        if: steps.brain.outputs.major_story == 'true'
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: node scripts/send-breaking-news-draft.mjs
        continue-on-error: true

      - name: Commit and push content update
        if: steps.brain.outputs.changed == 'true' || steps.videos.outputs.changed == 'true'
        run: |
          # The "Audit automated update" step earlier in this workflow already
          # ran `npm run audit:all` (which includes audit:automated). Re-running
          # it here would be redundant — the data hasn't changed since.
          git config user.name "Surfaced Bot"
          git config user.email "bot@surfaced.daily"
          git add automated-content public/automated-content
          if git diff --staged --quiet; then
            echo "No live content changes to commit"
            exit 0
          fi
          git commit -m "Content Update: live signals $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry push up to 3x — the bot pushes from multiple workflows so
          # a transient race against a parallel commit shouldn't waste a run.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "Push failed after 3 attempts"
          exit 1

  alert-on-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: update-live-content
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create GitHub Issue for failed run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const title = `Trending Live content failed - ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `The **Trending Live Content** workflow failed.`,
              ``,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Triggered by: ${context.eventName}`,
              ``,
              `The workflow fails closed, so no unvalidated live content was committed.`
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'automation']
            });

      - name: Notify Slack webhook
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: Trending Live Content
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; GitHub issue notification created."
            exit 0
          fi
          node -e 'process.stdout.write(JSON.stringify({ text: `Surfaced automation failed: ${process.env.WORKFLOW_NAME}\n${process.env.RUN_URL}` }))' \
            | curl -fsS -X POST -H "Content-Type: application/json" --data @- "$SLACK_WEBHOOK_URL"

name: Cleanup Bluesky Posts
on: workflow_dispatch
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Delete all Bluesky posts
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          node -e "
          async function main() {
            const handle = process.env.BLUESKY_HANDLE;
            const password = process.env.BLUESKY_APP_PASSWORD;
            const sessionRes = await fetch('https://bsky.social/xrpc/com.atproto.server.createSession', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ identifier: handle, password }),
            });
            const session = await sessionRes.json();
            console.log('Logged in as ' + session.did);
            const listRes = await fetch(
              'https://bsky.social/xrpc/com.atproto.repo.listRecords?repo=' + session.did + '&collection=app.bsky.feed.post&limit=100',
              { headers: { Authorization: 'Bearer ' + session.accessJwt } }
            );
            const listData = await listRes.json();
            console.log('Found ' + listData.records.length + ' posts');
            for (const record of listData.records) {
              const rkey = record.uri.split('/').pop();
              const delRes = await fetch('https://bsky.social/xrpc/com.atproto.repo.deleteRecord', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + session.accessJwt },
                body: JSON.stringify({ repo: session.did, collection: 'app.bsky.feed.post', rkey }),
              });
              console.log(delRes.ok ? '  Deleted: ' + record.value.text?.slice(0, 60) : '  Failed: ' + rkey);
            }
            console.log('Done');
          }
          main().catch(console.error);
          "

name: Build Validation

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/social-queue.json'
      - 'data/social-posted.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: AdSense content audit
        run: npm run audit:adsense

      - name: Build site
        id: build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build-output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "build_exit_code=$BUILD_EXIT" >> "$GITHUB_OUTPUT"
          exit "$BUILD_EXIT"

      - name: Validate page count
        id: validate
        if: success()
        run: |
          TOTAL_HTML=$(find out -name "*.html" | wc -l)
          ITEM_PAGES=$(find out/item -name "*.html" 2>/dev/null | wc -l)
          TOP_PAGES=$(find out -maxdepth 1 -name "*.html" | wc -l)
          COLLECTION_PAGES=$(find out/collections -name "*.html" 2>/dev/null | wc -l)

          echo "total_html=$TOTAL_HTML" >> "$GITHUB_OUTPUT"
          echo "item_pages=$ITEM_PAGES" >> "$GITHUB_OUTPUT"
          echo "top_pages=$TOP_PAGES" >> "$GITHUB_OUTPUT"
          echo "collection_pages=$COLLECTION_PAGES" >> "$GITHUB_OUTPUT"

          echo "📊 Build Results:"
          echo "   Total HTML pages: $TOTAL_HTML"
          echo "   Item pages:       $ITEM_PAGES"
          echo "   Top-level pages:  $TOP_PAGES"
          echo "   Collection pages: $COLLECTION_PAGES"

          # ── Regression thresholds ──
          # Item pages should track data/*.json + archive item counts within 2%.
          # Anything bigger means slugs collided, JSON parse failed silently,
          # or generateStaticParams quietly excluded items.
          DATA_ITEMS=$(node -e "
            const f=require('fs');
            const cats = ['discoveries','products','hidden-gems','future-radar','daily-tools'];
            let n = 0;
            for (const c of cats) n += JSON.parse(f.readFileSync('data/'+c+'.json','utf8')).length;
            n += JSON.parse(f.readFileSync('data/archive.json','utf8')).length;
            console.log(n);
          ")
          # Allow 2% slack (rounded down)
          MIN_ITEM_PAGES=$(node -e "console.log(Math.floor($DATA_ITEMS * 0.98))")

          echo "   Data-file items:  $DATA_ITEMS"
          echo "   Min item pages:   $MIN_ITEM_PAGES (98% of data)"

          ERRORS=""

          if [ "$ITEM_PAGES" -lt "$MIN_ITEM_PAGES" ]; then
            ERRORS="${ERRORS}❌ Item pages ($ITEM_PAGES) dropped > 2% below data-file count ($DATA_ITEMS).\n"
          fi

          if [ "$TOP_PAGES" -lt 15 ]; then
            ERRORS="${ERRORS}❌ Top-level pages ($TOP_PAGES) dropped below 15 minimum.\n"
          fi

          if [ -n "$ERRORS" ]; then
            echo ""
            echo "⚠️ VALIDATION FAILED:"
            echo -e "$ERRORS"
            echo "validation_passed=false" >> "$GITHUB_OUTPUT"
            echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo ""
          echo "✅ Page count tracks data within 2% threshold."
          echo "validation_passed=true" >> "$GITHUB_OUTPUT"

      - name: SEO validator (strict)
        if: success()
        run: |
          echo "🔍 Running SEO validator in strict mode..."
          # postbuild already ran in --warn mode; this re-runs strict to fail
          # the job on any error (missing meta/canonical/H1/JSON-LD).
          npm run validate:seo

      - name: Check for broken data files
        if: success()
        run: |
          echo "🔍 Validating JSON data files..."
          ERRORS=""

          # Live-niche files must have 10+ items each (regression guard).
          # Archived files (discoveries, products, future-radar) became empty
          # arrays after the 2026-05 pivot — they're checked for valid JSON
          # array shape only.
          LIVE_FILES="data/hidden-gems.json data/daily-tools.json"
          ARCHIVED_FILES="data/products.json data/discoveries.json data/future-radar.json"

          for f in $LIVE_FILES $ARCHIVED_FILES; do
            if [ ! -f "$f" ]; then
              ERRORS="${ERRORS}❌ Missing: $f\n"
              continue
            fi

            COUNT=$(node -e "
              try {
                const d = JSON.parse(require('fs').readFileSync('$f','utf-8'));
                console.log(Array.isArray(d) ? d.length : 'NOT_ARRAY');
              } catch(e) {
                console.log('PARSE_ERROR');
              }
            ")

            if [ "$COUNT" = "PARSE_ERROR" ]; then
              ERRORS="${ERRORS}❌ Invalid JSON: $f\n"
            elif [ "$COUNT" = "NOT_ARRAY" ]; then
              ERRORS="${ERRORS}❌ Not an array: $f\n"
            elif echo "$LIVE_FILES" | grep -q "$f" && [ "$COUNT" -lt 10 ]; then
              ERRORS="${ERRORS}❌ $f has only $COUNT items (live-niche files require 10+)\n"
            else
              echo "   ✅ $f: $COUNT items"
            fi
          done

          # Check image cache
          if [ -f "data/image-cache.json" ]; then
            IMG_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/image-cache.json','utf-8')); console.log(Object.keys(d).length)")
            echo "   ✅ image-cache.json: $IMG_COUNT entries"
          else
            ERRORS="${ERRORS}❌ Missing: data/image-cache.json\n"
          fi

          if [ -n "$ERRORS" ]; then
            echo ""
            echo "⚠️ DATA VALIDATION FAILED:"
            echo -e "$ERRORS"
            exit 1
          fi

          echo ""
          echo "✅ All data files valid."

      - name: Affiliate integrity check
        if: success()
        run: |
          node -e "
            const products = require('./data/products.json');
            const bad = products.filter(p => p.availableOnAmazon && !p.amazonAsin);
            if (bad.length) {
              console.error('FAIL: ' + bad.length + ' product(s) have availableOnAmazon:true without amazonAsin:');
              bad.forEach(p => console.error('  - ' + p.slug));
              process.exit(1);
            }
            const good = products.filter(p => p.availableOnAmazon).length;
            console.log('OK: ' + good + ' Amazon product(s) have valid ASINs');
          "

      - name: HTTPS outbound link check
        if: success()
        run: |
          node -e "
            const linkFields = {
              'daily-tools':  'websiteLink',
              'hidden-gems':  'websiteLink',
              'discoveries':  'sourceLink',
              'products':     'sourceLink',
              'future-radar': 'sourceLink',
            };
            const bad = [];
            for (const [file, field] of Object.entries(linkFields)) {
              const items = require('./data/' + file + '.json');
              items.forEach(i => {
                if (i[field] && i[field].startsWith('http://'))
                  bad.push(file + ' / ' + i.slug + ': ' + i[field]);
              });
            }
            if (bad.length) {
              console.error('FAIL: ' + bad.length + ' outbound link(s) use http:// (must be https://):');
              bad.forEach(b => console.error('  - ' + b));
              process.exit(1);
            }
            console.log('OK: all outbound links use https://');
          "

      - name: Spot-check critical pages exist
        if: success()
        run: |
          echo "🔍 Checking critical pages..."
          MISSING=""

          CRITICAL_PAGES=(
            "out/index.html"
            "out/404.html"
            "out/about.html"
            "out/categories.html"
            "out/discover.html"
            "out/trending.html"
            "out/hidden-gems.html"
            "out/future-radar.html"
            "out/tools.html"
            "out/affiliate-disclosure.html"
            "out/contact.html"
            "out/privacy.html"
            "out/premium.html"
            "out/terms.html"
            "out/newsletter.html"
            "out/saved.html"
          )

          for page in "${CRITICAL_PAGES[@]}"; do
            if [ -f "$page" ]; then
              SIZE=$(wc -c < "$page")
              if [ "$SIZE" -lt 1000 ]; then
                MISSING="${MISSING}⚠️ $page exists but is suspiciously small (${SIZE} bytes)\n"
              else
                echo "   ✅ $page (${SIZE} bytes)"
              fi
            else
              MISSING="${MISSING}❌ Missing: $page\n"
            fi
          done

          # Check a sample of item pages
          SAMPLE_ITEMS=$(find out/item -name "*.html" | shuf | head -5)
          for page in $SAMPLE_ITEMS; do
            SIZE=$(wc -c < "$page")
            SLUG=$(basename "$page" .html)
            if [ "$SIZE" -lt 1000 ]; then
              MISSING="${MISSING}⚠️ Item $SLUG is suspiciously small (${SIZE} bytes)\n"
            else
              echo "   ✅ item/$SLUG (${SIZE} bytes)"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo ""
            echo "⚠️ CRITICAL PAGE CHECK FAILED:"
            echo -e "$MISSING"
            exit 1
          fi

          echo ""
          echo "✅ All critical pages present and valid."

      - name: Install Lighthouse CI
        if: success()
        run: npm install -g @lhci/cli

      - name: Serve static site and run Lighthouse CI
        id: lighthouse
        if: success()
        run: |
          # Serve the static export on port 8080
          npx serve out -l 8080 &
          SERVER_PID=$!
          sleep 3

          # Verify server is up
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || true

          # Run Lighthouse 3 times on the homepage for stable median scores
          lhci collect \
            --url="http://localhost:8080" \
            --numberOfRuns=3 \
            --settings.preset=desktop \
            --settings.chromeFlags="--no-sandbox --headless"

          # Run assertions using config file (CLI flags don't handle categories: syntax well)
          set -o pipefail
          lhci assert --config=lighthouserc.json 2>&1 | tee /tmp/lhci-results.log
          LHCI_EXIT=$?
          set +o pipefail

          # Also run against a sample item page (warn-only, lower threshold)
          SAMPLE_SLUG=$(find out/item -name "*.html" | shuf | head -1 | xargs basename | sed 's/.html//')
          if [ -n "$SAMPLE_SLUG" ]; then
            echo ""
            echo "🔍 Running Lighthouse on sample item page: /item/$SAMPLE_SLUG"
            lhci collect \
              --url="http://localhost:8080/item/$SAMPLE_SLUG" \
              --numberOfRuns=1 \
              --settings.preset=desktop \
              --settings.chromeFlags="--no-sandbox --headless"

            # Item page: warn-only at 0.80 performance
            lhci assert --config=lighthouserc-item.json 2>&1 | tee -a /tmp/lhci-results.log || true
          fi

          # Extract scores for the summary
          echo ""
          echo "🏗️ Lighthouse CI Results:"
          cat /tmp/lhci-results.log | head -30

          # Kill the server
          kill $SERVER_PID 2>/dev/null || true

          # Fail the job if homepage thresholds weren't met
          exit $LHCI_EXIT

      - name: Upload Lighthouse reports
        if: always() && steps.lighthouse.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14

      - name: Performance summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo "  Surfaced Build Validation Summary"
          echo "═══════════════════════════════════════"

          if [ -f out/index.html ]; then
            TOTAL=$(find out -name "*.html" | wc -l)
            ITEMS=$(find out/item -name "*.html" 2>/dev/null | wc -l)
            STATIC_SIZE=$(du -sh out 2>/dev/null | cut -f1)
            echo "  Pages:       $TOTAL total ($ITEMS items)"
            echo "  Build size:  $STATIC_SIZE"
          else
            echo "  ❌ Build failed — no output found"
          fi

          echo "  Commit:      ${GITHUB_SHA:0:8}"
          echo "  Branch:      $GITHUB_REF_NAME"
          echo "═══════════════════════════════════════"

  alert-on-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate-build
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create GitHub Issue for failed validation
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const title = `🚨 Build validation failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              `The **Build Validation** workflow failed after a push to \`main\`.`,
              ``,
              `This means the latest deploy to Cloudflare Pages may have issues.`,
              ``,
              `**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit:** \`${context.sha.slice(0, 8)}\``,
              `**Triggered by:** ${context.eventName}`,
              ``,
              `### What to check:`,
              `- Did the build complete without errors?`,
              `- Are all 530+ pages generated?`,
              `- Are all data JSON files valid?`,
              `- Are critical pages (index, 404, categories) present?`,
              ``,
              `Check the run logs for specific failures.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'automation']
            });

      - name: Notify Slack webhook
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: Build Validation
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; GitHub issue notification created."
            exit 0
          fi
          node -e 'process.stdout.write(JSON.stringify({ text: `Surfaced automation failed: ${process.env.WORKFLOW_NAME}\n${process.env.RUN_URL}` }))' \
            | curl -fsS -X POST -H "Content-Type: application/json" --data @- "$SLACK_WEBHOOK_URL"

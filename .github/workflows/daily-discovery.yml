name: Daily Discovery Candidates

on:
  # PAUSED 2026-05-19: Surfaced pivoted to hidden-gems + daily-tools only and
  # this script queues candidates across the legacy verticals. Re-enable after
  # updating scripts/discover-current-events.mjs.
  # schedule:
  #   - cron: '30 9 * * *'
  workflow_dispatch:

concurrency:
  group: daily-discovery-candidates
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate review-only current-event candidates
        env:
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: node scripts/daily-discovery.mjs --output=data/current-events-candidates.json

      - name: Candidate smoke tests
        run: |
          npx tsx --test scripts/current-event-engine.test.ts scripts/commerce-discovery.test.ts
          node --test scripts/daily-discovery.test.mjs

      - name: Confirm homepage source remains manually gated
        run: npm run audit:current-events

      - name: Upload candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: current-events-candidates
          path: data/current-events-candidates.json
          retention-days: 14

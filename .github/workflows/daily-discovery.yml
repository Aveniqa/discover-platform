name: Daily Discovery Candidates

on:
  # RETIRED 2026-05-19 (confirmed 2026-07-01): Surfaced pivoted to
  # hidden-gems + daily-tools only; this script queues current-event
  # candidates across the legacy verticals, which are no longer published.
  # Do NOT re-enable the schedule unless the pivot is reversed.
  # schedule:
  #   - cron: '30 9 * * *'
  workflow_dispatch:

concurrency:
  group: daily-discovery-candidates
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate review-only current-event candidates
        env:
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
        run: node scripts/daily-discovery.mjs --output=data/current-events-candidates.json

      - name: Candidate smoke tests
        run: |
          npx tsx --test scripts/current-event-engine.test.ts scripts/commerce-discovery.test.ts
          node --test scripts/daily-discovery.test.mjs

      - name: Confirm homepage source remains manually gated
        run: npm run audit:current-events

      - name: Upload candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: current-events-candidates
          path: data/current-events-candidates.json
          retention-days: 14
